<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>顺凯塑胶 · 电子名片</title>
    <!-- Leaflet (地图) 样式与脚本 -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Font Awesome 5 (免费图标库) 用于产品/专利占位图片 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #eef2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .card {
            max-width: 580px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 20px 35px -8px rgba(0, 20, 30, 0.2);
            overflow: hidden;
            transition: all 0.2s ease;
            border: 1px solid rgba(0,0,0,0.02);
        }
        .card-content {
            padding: 28px 24px 30px;
        }
        /* 公司名称 */
        .company-name {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: #0b2b3c;
            margin-bottom: 6px;
            line-height: 1.2;
            border-left: 6px solid #2a7faa;
            padding-left: 16px;
        }
        .company-tag {
            font-size: 14px;
            color: #4f6f7f;
            margin-bottom: 26px;
            margin-top: 5px;
            padding-left: 22px;
            font-weight: 400;
        }
        /* 区块通用 */
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #1e4a5f;
            margin: 24px 0 12px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px solid #d0e2ed;
            padding-bottom: 6px;
        }
        .section-title i {
            color: #2a7faa;
            font-size: 18px;
            width: 24px;
        }
        /* 产品图片网格 */
        .product-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: space-between;
            margin-top: 8px;
        }
        .product-item {
            flex: 1 1 0;
            min-width: 90px;
            background: #f4f9fc;
            border-radius: 20px;
            padding: 16px 6px 10px;
            text-align: center;
            transition: transform 0.1s ease;
            border: 1px solid #e0edf2;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .product-item i {
            font-size: 42px;
            color: #2a7faa;
            opacity: 0.9;
            margin-bottom: 6px;
        }
        .product-item span {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #1c4e62;
            background: #e1eff5;
            padding: 4px 8px;
            border-radius: 50px;
            margin-top: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        /* 专利双列 */
        .patent-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-top: 8px;
        }
        .patent-item {
            flex: 1 1 0;
            min-width: 120px;
            background: #f4f9fc;
            border-radius: 20px;
            padding: 16px 6px 12px;
            text-align: center;
            border: 1px solid #e0edf2;
        }
        .patent-item i {
            font-size: 44px;
            color: #3f7e9c;
            margin-bottom: 6px;
        }
        .patent-label {
            font-weight: 600;
            font-size: 16px;
            color: #0b3b4a;
            margin: 6px 0 2px;
        }
        .patent-desc {
            font-size: 12px;
            color: #4e6d7c;
            background: #e8f0f4;
            display: inline-block;
            padding: 3px 12px;
            border-radius: 30px;
        }
        /* 地址区域 */
        .address-text {
            background: #f0f7fb;
            padding: 16px 18px;
            border-radius: 24px;
            margin: 8px 0 15px;
            font-size: 15px;
            color: #104256;
            border-left: 4px solid #2a7faa;
            line-height: 1.5;
            word-break: break-word;
        }
        .address-text i {
            margin-right: 6px;
            color: #2a7faa;
            width: 20px;
        }
        /* 地图容器 (leaflet) */
        #map {
            width: 100%;
            height: 200px;
            border-radius: 28px;
            margin: 10px 0 8px;
            box-shadow: 0 6px 14px rgba(0, 40, 50, 0.12);
            border: 2px solid white;
            z-index: 5;
        }
        /* 联系方式 */
        .contact-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            background: #f1f6f9;
            border-radius: 40px;
            padding: 18px 24px;
            margin-top: 24px;
            justify-content: space-between;
            align-items: center;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 16px;
            color: #113946;
        }
        .contact-item i {
            font-size: 22px;
            color: #2a7faa;
            width: 30px;
            text-align: center;
        }
        .contact-item a {
            color: #1a4d5e;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px dotted #85b8cf;
        }
        .contact-item a:hover {
            color: #0a2e3a;
            border-bottom: 1px solid;
        }
        .contact-spacer {
            flex: 1;
        }
        /* 小注 */
        .footnote {
            text-align: center;
            font-size: 11px;
            color: #97b7c7;
            margin-top: 16px;
            letter-spacing: 0.2px;
        }
        /* 响应式微调 */
        @media (max-width: 480px) {
            .card-content { padding: 20px 16px; }
            .company-name { font-size: 24px; }
            .product-grid { gap: 8px; }
            .product-item i { font-size: 32px; }
            .patent-item i { font-size: 36px; }
            .contact-row { flex-direction: column; align-items: flex-start; gap: 12px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-content">
            <!-- 公司名称 -->
            <h1 class="company-name">东莞市顺凯塑胶有限公司</h1>
            <div class="company-tag">精密塑胶 · 创新专利</div>

            <!-- 产品区域 (带产品图片占位) -->
            <div class="section-title">
                <i class="fas fa-cubes"></i> 塑胶产品
            </div>
            <div class="product-grid">
                <div class="product-item">
                    <i class="fas fa-box-open"></i>
                    <span>工程塑胶件</span>
                </div>
                <div class="product-item">
                    <i class="fas fa-tools"></i>
                    <span>精密模具</span>
                </div>
                <div class="product-item">
                    <i class="fas fa-fill-drip"></i>
                    <span>注塑制品</span>
                </div>
            </div>
            <!-- 提示：产品图片示意（实际应用中替换为真实产品照片） -->
            <div style="font-size: 12px; color: #6d8d9c; margin-top: 6px; text-align: right;">
                <i class="far fa-image"></i> 产品图示意 (可替换为真实图片)
            </div>

            <!-- 专利区域 (专利图片 + 实物图片) -->
            <div class="section-title">
                <i class="fas fa-certificate"></i> 专利 & 实物
            </div>
            <div class="patent-grid">
                <!-- 专利图片卡片 -->
                <div class="patent-item">
                    <i class="fas fa-file-alt" style="color: #3f6b80;"></i>
                    <div class="patent-label">专利证书</div>
                    <span class="patent-desc"><i class="far fa-images"></i> 外观/实用新型</span>
                </div>
                <!-- 实物图片卡片 -->
                <div class="patent-item">
                    <i class="fas fa-cube" style="color: #4a7e8f;"></i>
                    <div class="patent-label">实物样品</div>
                    <span class="patent-desc"><i class="fas fa-tag"></i> 专利产品实物</span>
                </div>
            </div>
            <!-- 注：专利图片及实物占位图标，真实应用可替换为<img> -->
            <div style="font-size: 12px; color: #6d8d9c; margin-top: 6px; text-align: right;">
                <i class="far fa-images"></i> 专利证书 / 实物图片示意
            </div>

            <!-- 地址 + 地图容器定位 -->
            <div class="section-title">
                <i class="fas fa-map-pin"></i> 公司地址
            </div>
            <div class="address-text">
                <i class="fas fa-location-dot"></i> 
                广东省东莞市塘厦镇塘厦莲湖西路7号2号楼102室
            </div>
            <!-- 地图容器 (Leaflet 定位) -->
            <div id="map"></div>
            <!-- 地址辅助说明：地图上已标记精确位置 -->
            <div style="font-size: 13px; color: #2e6a7a; margin: 8px 0 0 6px;">
                <i class="fas fa-crosshairs"></i> 卫星/地图定位点 (莲湖西路7号)
            </div>

            <!-- 联系方式 -->
            <div class="section-title" style="margin-top: 28px;">
                <i class="fas fa-address-card"></i> 联系方式
            </div>
            <div class="contact-row">
                <div class="contact-item">
                    <i class="fas fa-envelope"></i>
                    <a href="mailto:ShunKaidg@163.com">ShunKaidg@163.com</a>
                </div>
                <div class="contact-item">
                    <i class="fas fa-phone-alt"></i>
                    <a href="tel:1234567890">123 4567 890</a>
                </div>
            </div>
            <!-- 占位电话提示（仅作演示） -->
            <div class="footnote">
                <i class="far fa-clock"></i> 电话占位 · 欢迎联系
            </div>
        </div>
    </div>

    <!-- 地图初始化脚本 (必须放在地图容器之后) -->
    <script>
        (function() {
            // 确保地图容器已经渲染
            const mapElement = document.getElementById('map');
            if (!mapElement) return;

            // 塘厦莲湖西路7号 约略坐标 (WGS84, 基于地图推测，展示用)
            const latitude = 22.7928;
            const longitude = 114.1154;

            // 初始化地图，设置视图和缩放
            const map = L.map('map').setView([latitude, longitude], 16);

            // 使用 OpenStreetMap 图块 (免费，需署名)
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                maxZoom: 19,
                detectRetina: true
            }).addTo(map);

            // 自定义公司标记 (带气泡)
            const marker = L.marker([latitude, longitude]).addTo(map);
            marker.bindPopup(`
                <b>东莞市顺凯塑胶有限公司</b><br>
                塘厦莲湖西路7号2号楼102室
            `).openPopup(); // 自动打开弹窗方便查看

            // 可选：添加一个浅色圆圈辅助定位
            L.circle([latitude, longitude], {
                color: '#2a7faa',
                fillColor: '#a5d1e6',
                fillOpacity: 0.15,
                radius: 18
            }).addTo(map);

            // 由于卡片可能在初始化时未完全稳定(但无大碍)，确保地图正确渲染
            // 针对移动端或隐藏的情况可以触发一次 resize
            setTimeout(() => {
                map.invalidateSize();
            }, 200);
        })();
    </script>
    <!-- 注：产品图片、专利图片区域使用的均为FontAwesome图标作为占位，实际应用中可直接替换为<img>标签 -->
</body>
</html>
